[plugin]
enabled = true
# 消息输出模式：text=普通消息，forward=合并转发消息
output_mode = "text"
# 管理员QQ号列表（只能通过修改配置文件来增减管理员）
# 留空则无人可管理插件
admin_ids = []
config_version = "1.2.1"

[game]
# 初始生命值
initial_health = 100
# 初始理智值
initial_sanity = 100
# 每次探索所消耗的理智值（v1.0.1 后调整为 2）
explore_sanity_cost = 2
# 每次寻找出口所消耗的理智值
exit_search_sanity_cost = 5
# 成功找到出口的基础概率 (0.0 ~ 1.0)
base_exit_chance = 0.2
# 每次寻找失败后成功概率的提升值
exit_chance_increment = 0.1
# 在楼层中遭遇实体的基础概率
entity_encounter_chance = 0.25
# 遇到安可欣时获得任务的概率（默认 50%，取值范围 0.0 ~ 1.0）
ankexin_task_chance = 0.5
# 在 Level 1 每探索多少次触发一次安可欣的日常工作任务（默认 10）
work_trigger_interval = 10

# ---- 好感度配置 ----
# 每次遇到角色时增加的好感度（默认 2）
favorability_per_encounter = 2
# 各物品赠礼好感度值（键为物品代码，值为好感度）
gift_favorability_values = {o1 = 5, o2 = 5, o3 = 5, o4 = 5, o5 = 5, o6 = 5, o7 = 5}

# ---- 对话模型配置 ----
# 角色对话使用的 LLM 任务名（需是麦麦已注册的 task 名），留空则默认使用 replyer（回复任务）
dialog_model = ""

# ---- 物资箱概率 ----
# 触发补给事件时各类物资箱的出现概率
# 大型箱：必出杏仁水；中型箱：必出杏仁水；小型箱：必出杏仁水
crate_large_chance = 0.08
crate_medium_chance = 0.15
crate_small_chance = 0.25

# ---- 各物品获取权重（权重越高，获得概率越大） ----
# 物品           默认权重  说明
# o1 (杏仁水)     3       恢复 30 点理智值
# o2 (急救包)     3       恢复 30 点生命值
# o3 (手电筒)     2       驱散笑魇和猎犬，+5% 出口率
# o4 (楼层钥匙)   1       100% 找到出口（稀有）
# o5 (无线电)     2       +5% 出口率
# o6 (能量棒)     2       恢复 15 点生命值
# o7 (镇定剂)     2       恢复 15 点理智值
item_weight_o1 = 3
item_weight_o2 = 3
item_weight_o3 = 2
item_weight_o4 = 1
item_weight_o5 = 2
item_weight_o6 = 2
item_weight_o7 = 2

[whitelist]
# 是否启用白名单（关闭后所有用户均可使用插件）
enabled = false
# 群组白名单 — 在此填入允许使用插件的群号
group_ids = [
    # "123456789",
    # "987654321",
]
# 私聊白名单 — 在此填入允许使用插件的用户 QQ 号
user_ids = [
    # "10001",
    # "10002",
]

# ---- 白名单拒绝提示（可自定义） ----
# 群组不在白名单时的提示
group_deny_message = "你所在的群组不在白名单中，无法使用后室:逃出生天插件。"
# 用户不在私聊白名单时的提示
private_deny_message = "你不在白名单中，无法使用后室:逃出生天插件。"
# 白名单启用但群组列表为空时的提示
empty_group_list_message = "白名单已启用，但群组列表为空，请联系管理员添加。"
# 白名单启用但私聊列表为空时的提示
empty_private_list_message = "白名单已启用，但私聊白名单为空，请联系管理员添加。"

[blacklist]
# 是否启用黑名单（关闭后不拦截任何用户）
enabled = false
# 群组黑名单 — 在此填入禁止使用插件的群号
group_ids = [
    # "111222333",
]
# 用户黑名单 — 在此填入禁止使用插件的用户 QQ 号
user_ids = [
    # "111222333",
]

# ---- 黑名单拒绝提示（可自定义） ----
# 群组被黑名单拦截时的提示
group_deny_message = "你所在的群组已被加入黑名单，无法使用后室:逃出生天插件。"
# 用户被黑名单拦截时的提示
private_deny_message = "你已被加入黑名单，无法使用后室:逃出生天插件。"
